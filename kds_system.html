<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor KDS - Arasa Goreng</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #2b2b2b; font-size: 14px; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 30px; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 6px solid #8b1a1a; }
        .header-title h2 { margin: 0 0 5px 0; color: #1a1a1a; letter-spacing: 1px; font-size: 24px; font-weight: 800; text-transform: uppercase; }
        .header-subtitle { color: #6e6e6e; font-size: 14px; font-weight: 600; }
        .btn-outline { background: transparent; color: #8b1a1a; padding: 12px 25px; border: 1px solid #8b1a1a; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-outline:hover { background: #8b1a1a; color: #ffffff; }
        .grid-kds { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .kds-card { background: #ffffff; border: 1px solid #eeeeee; border-radius: 16px; padding: 30px; text-align: center; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .kds-title { color: #8b1a1a; font-size: 22px; font-weight: 800; border-bottom: 2px solid #f4f6f8; padding-bottom: 15px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .kds-total { color: #1a1a1a; font-size: 90px; font-weight: 900; line-height: 1; margin-bottom: 25px; display: flex; align-items: baseline; justify-content: center; }
        .kds-total span { font-size: 24px; color: #6e6e6e; margin-left: 8px; font-weight: 700; }
        .kds-history { background: #fafafa; padding: 15px; border-radius: 12px; text-align: left; border: 1px solid #eeeeee; }
        .kds-history-title { color: #6e6e6e; font-size: 12px; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .kds-history-item { font-size: 14px; border-bottom: 1px dashed #dcdcdc; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; color: #2b2b2b; font-weight: 600; }
        .kds-history-item:last-child { border-bottom: none; padding-bottom: 0; }
        .qty-plus { color: #2e7d32; font-weight: 800; font-size: 18px; }
        .qty-detail { color: #6e6e6e; font-weight: 700; font-size: 13px; }
        .empty-state { grid-column: 1 / -1; text-align: center; color: #6e6e6e; font-size: 18px; font-weight: 700; margin-top: 50px; padding: 50px; border: 2px dashed #dcdcdc; border-radius: 16px; background: #ffffff; }
        
        .ticket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .ticket-card { background: #ffffff; border: 2px solid #eeeeee; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .ticket-header { display: flex; justify-content: space-between; border-bottom: 2px dashed #dcdcdc; padding-bottom: 10px; margin-bottom: 15px; }
        .ticket-no { font-weight: 900; color: #8b1a1a; font-size: 16px; font-family: monospace; }
        .ticket-time { color: #6e6e6e; font-size: 13px; font-weight: 600; }
        .ticket-items { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .ticket-items li { font-size: 16px; font-weight: 800; color: #1a1a1a; padding: 6px 0; display: flex; justify-content: space-between; }
        .btn-selesai { width: 100%; padding: 14px; background: #2e7d32; color: #ffffff; border: none; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-selesai:hover { background: #1b5e20; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h2>Monitor Eksekusi Goreng</h2>
            <span id="kds-info" class="header-subtitle">Memuat kalibrasi jaringan...</span>
        </div>
        <button onclick="logout()" class="btn-outline">Tutup Monitor</button>
    </div>

    <div id="kds-container" class="grid-kds">
        <div class="empty-state">Menyinkronkan gelombang antrean...</div>
    </div>

    <h3 style="margin-top: 40px; color: #1a1a1a; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #8b1a1a; display: inline-block; padding-bottom: 5px;">Daftar Tiket Antrean Aktif</h3>
    <div id="ticket-container" class="ticket-grid"></div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        const myRole = localStorage.getItem('userRole') || '';
        const myBranch = localStorage.getItem('userBranch') || '';

        if (myRole !== 'produksi_goreng' && myRole !== 'admin_pusat' && myRole !== 'admin') {
            window.location.href = 'login.html';
        }

        document.getElementById('kds-info').innerText = `Zona Operasional: Arasa ${myBranch}`;

        async function loadQueue() {
            const { data: prods } = await supabaseClient.from('products').select('id, name').eq('type', 'dadakan');
            if (!prods) return setTimeout(loadQueue, 3000);

            const { data: queues } = await supabaseClient.from('kds_queue').select('transaction_id').eq('status', 'waiting').eq('branch', myBranch);
            
            let trxIds = queues ? queues.map(q => q.transaction_id) : [];
            let aggregations = {};
            
            prods.forEach(p => { aggregations[p.id] = { name: p.name, total: 0, history: [] }; });

            const container = document.getElementById('kds-container');
            const ticketContainer = document.getElementById('ticket-container');
            
            container.innerHTML = ''; ticketContainer.innerHTML = '';
            let hasActive = false;

            if (trxIds.length > 0) {
                // Tarik data detail transaksi (Penting: urutkan dari yang PALING LAMA)
                const { data: trxData } = await supabaseClient.from('transactions').select('id, receipt_no, created_at, transaction_items(product_id, qty)').in('id', trxIds).order('created_at', { ascending: true });
                
                if (trxData) {
                    trxData.forEach(trx => {
                        const timeStr = new Date(trx.created_at).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                        let itemsHtml = '';
                        
                        trx.transaction_items.forEach(item => {
                            if (aggregations[item.product_id]) {
                                const qtyRiilPcs = item.qty * 10; 
                                aggregations[item.product_id].total += qtyRiilPcs;
                                
                                if (aggregations[item.product_id].history.length < 3) {
                                    aggregations[item.product_id].history.push(`<span class="qty-plus">+${qtyRiilPcs} Pcs</span> <span class="qty-detail">${timeStr}</span>`);
                                }

                                itemsHtml += `<li><span>${aggregations[item.product_id].name}</span> <span style="color:#8b1a1a;">${qtyRiilPcs} Pcs</span></li>`;
                            }
                        });

                        // Render Tiket
                        if (itemsHtml !== '') {
                            ticketContainer.innerHTML += `
                                <div class="ticket-card">
                                    <div class="ticket-header">
                                        <span class="ticket-no">${trx.receipt_no || 'KDS-TRX'}</span>
                                        <span class="ticket-time">Jam: ${timeStr}</span>
                                    </div>
                                    <ul class="ticket-items">${itemsHtml}</ul>
                                    <button onclick="selesaikanTiket('${trx.id}')" class="btn-selesai">Tandai Matang & Selesai</button>
                                </div>
                            `;
                        }
                    });
                }
            }
            
            // Render Agregasi (Kotak Besar)
            Object.values(aggregations).forEach(agg => {
                if (agg.total > 0) {
                    hasActive = true;
                    let histHtml = agg.history.map(h => `<div class="kds-history-item">${h}</div>`).join('');
                    container.innerHTML += `
                        <div class="kds-card">
                            <div class="kds-title">${agg.name}</div>
                            <div class="kds-total">${agg.total}<span>Pcs</span></div>
                            <div class="kds-history"><div class="kds-history-title">Log Penambahan (3 Terakhir)</div>${histHtml}</div>
                        </div>`;
                }
            });

            if (!hasActive) {
                container.innerHTML = '<div class="empty-state">Radar bersih. Tidak ada tumpukan orderan berjalan.</div>';
                ticketContainer.innerHTML = '<div style="grid-column: 1/-1; color: #6e6e6e; font-weight: 600;">Belum ada tiket antrean.</div>';
            }

            // Loop ping server
            setTimeout(loadQueue, 5000); 
        }

        // FUNGSI PEMBERSIH KDS
        async function selesaikanTiket(trxId) {
            try {
                await supabaseClient.from('kds_queue').update({ status: 'completed' }).eq('transaction_id', trxId);
                // Langsung refresh tanpa menunggu timer
                loadQueue(); 
            } catch (err) {
                console.error(err); alert("Gagal menyelesaikan tiket. Periksa koneksi.");
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        loadQueue();
    </script>
</body>
</html>
