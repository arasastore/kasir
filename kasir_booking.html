<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Arasa Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #2b2b2b; font-size: 14px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; border-left: 6px solid #8b1a1a; }
        .header-title h2 { font-size: 22px; color: #1a1a1a; font-weight: 700; letter-spacing: 0.5px; }
        .header-subtitle { color: #6e6e6e; font-size: 13px; font-weight: 600; margin-top: 4px; display: block; }
        .nav-tabs { display: flex; gap: 25px; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs a { text-decoration: none; color: #6e6e6e; font-weight: 600; font-size: 14px; transition: 0.3s; position: relative; padding-bottom: 12px; }
        .nav-tabs a:hover, .nav-tabs a.active { color: #8b1a1a; }
        .nav-tabs a.active::after { content: ''; position: absolute; bottom: -13px; left: 0; width: 100%; height: 3px; background-color: #8b1a1a; border-radius: 3px 3px 0 0; }
        .card { background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .grid-booking { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card-booking { background: #fafafa; border: 1px solid #eeeeee; padding: 20px; border-radius: 12px; position: relative; transition: 0.2s; display: flex; flex-direction: column; }
        .card-booking:hover { border-color: #8b1a1a; box-shadow: 0 4px 15px rgba(139,26,26,0.05); transform: translateY(-2px); }
        .badge-status { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        .bg-paid { background: #d4edda; color: #155724; }
        .bg-hold { background: #fff3cd; color: #856404; }
        .search-bar { width: 100%; max-width: 400px; padding: 12px 15px; border: 1px solid #dcdcdc; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .search-bar:focus { border-color: #8b1a1a; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-primary { background: #8b1a1a; color: #ffffff; width: 100%; padding: 12px; }
        .btn-primary:hover { background: #6b1414; }
        .btn-success { background: #2e7d32; color: #ffffff; width: 100%; padding: 12px; }
        .btn-success:hover { background: #1b5e20; }
        .btn-outline { background: transparent; color: #8b1a1a; border: 1px solid #8b1a1a; width: 100%; padding: 12px; }
        .btn-info { background: #0288d1; color: #ffffff; }
        .web-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .web-modal-content { background: #ffffff; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .input-nominal { width: 100%; padding: 16px; font-size: 22px; text-align: center; font-weight: 700; border: 1px solid #dcdcdc; border-radius: 10px; margin-bottom: 15px; outline: none; }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 15px; } .header .btn { width: 100%; } .search-bar { max-width: 100%; } }
        
        /* CSS KHUSUS PRINTER */
        @media print { body * { visibility: hidden; margin: 0; padding: 0; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 58mm; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: black; padding: 5px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h2>Manajemen Booking</h2>
            <span class="header-subtitle">Pengawasan order di masa depan</span>
        </div>
        <button onclick="window.location.href='index.html'" class="btn btn-outline" style="width:auto; padding:10px 20px;">Kembali ke Kasir</button>
    </div>

    <div class="nav-tabs">
        <a href="index.html">Kasir Utama</a>
        <a href="kasir_waiting.html">Antrean KDS</a>
        <a href="kasir_hold.html">Hold Tagihan</a>
        <a href="kasir_booking.html" class="active">Booking</a>
        <a href="kasir_order.html">Order Pusat</a>
        <a href="kasir_riwayat.html">Riwayat</a>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <h3 style="color:#1a1a1a; font-size:18px;">Daftar Pesanan Mendatang</h3>
            <input type="text" id="search-booking" class="search-bar" placeholder="Pencarian Nama / WhatsApp / Ref..." onkeyup="filterBooking()">
        </div>
        <div id="booking-list" class="grid-booking"><p style="color:#6e6e6e;">Memuat data booking...</p></div>
    </div>

    <div id="modalTipeBayar" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0; color:#1a1a1a; margin-bottom:15px;">Pelunasan Booking</h2><p style="color:#6e6e6e; margin-bottom:5px;">Total Sisa Tagihan</p><h3 style="font-size: 28px; color:#8b1a1a; margin-bottom:25px;" id="teks-total-modal">Rp 0</h3><div style="display:flex; gap:10px; margin-bottom: 15px;"><button class="btn btn-primary" style="flex:1; padding:15px;" onclick="bukaModalCash()">Tunai (Cash)</button><button class="btn btn-info" style="flex:1; padding:15px;" onclick="prosesLunas('Non-Cash')">Non-Tunai</button></div><button class="btn btn-outline" onclick="tutupModal('modalTipeBayar')">Batal</button></div></div>
    
    <div id="modalCash" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0; color:#1a1a1a; margin-bottom:15px;">Penerimaan Tunai</h2><p style="color:#6e6e6e; margin-bottom:5px;">Tagihan: <strong style="color:#1a1a1a;" id="teks-total-cash">Rp 0</strong></p><input type="number" id="input-uang-pas" class="input-nominal" placeholder="Nominal Uang" onkeyup="hitungKembalian()" style="margin-top:15px;"><div style="background:#fafafa; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #eeeeee;"><span style="font-size:12px; color:#6e6e6e; font-weight:700; text-transform:uppercase;">Kembalian</span><h3 id="teks-kembalian" style="color: #2e7d32; margin: 5px 0 0 0; font-size:24px;">Rp 0</h3></div><button id="btn-konfirm-cash" class="btn btn-primary" style="margin-bottom:10px;" onclick="prosesLunas('Cash')" disabled>Konfirmasi Lunas & Cetak</button><button class="btn btn-outline" onclick="tutupModal('modalCash')">Kembali</button></div></div>

    <div id="print-area" class="print-area" style="display: none;"></div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        let dataBookingAsli = []; 
        let gTrxId = null, gTotal = 0, gItems = [], gReceipt = '', gCustName = '';

        function tutupModal(id) { document.getElementById(id).style.display = 'none'; }

        async function loadBooking() {
            // Ditambahkan pemanggilan 'price' agar bisa cetak struk dengan harga
            const { data, error } = await supabaseClient.from('transactions').select('id, receipt_no, customer_name, customer_wa, total_amount, status, booking_date, pickup_branch, transaction_items(qty, price, product_id, products(name, type, stock))').not('pickup_branch', 'is', null).order('booking_date', { ascending: true });
            if (!error) { dataBookingAsli = data; renderBooking(data); }
        }

        function renderBooking(data) {
            const list = document.getElementById('booking-list'); list.innerHTML = '';
            if (data.length === 0) return list.innerHTML = '<p style="color:#6e6e6e; grid-column:1/-1;">Belum ada data pre-order terdaftar.</p>';

            data.forEach(b => {
                const isPaid = b.status === 'paid';
                const isCompleted = b.status === 'completed'; // SUDAH DIAMBIL = COMPLETED
                let badgeStatus = '';
                let btnAksi = '';

                // Logika Cerdas Status Booking
                if (isCompleted) {
                    badgeStatus = `<span class="badge-status bg-paid" style="background:#d1ecf1; color:#0c5460; border: 1px solid #bee5eb;">Sudah Diambil</span>`;
                    btnAksi = ``; // Jika sudah diambil, tidak ada tombol lagi
                } else if (isPaid) {
                    badgeStatus = `<span class="badge-status bg-paid">Lunas (Belum Diambil)</span>`;
                    // Tombol Sakti untuk menyelesaikan order ke KDS
                    btnAksi = `<button onclick="tandaiDiambil('${b.id}')" class="btn btn-success" style="margin-top:15px;">Tandai Sudah Diambil</button>`;
                } else {
                    badgeStatus = `<span class="badge-status bg-hold">Belum Lunas</span>`;
                    btnAksi = `<button onclick="siapkanLunas('${b.id}', ${b.total_amount}, '${encodeURIComponent(JSON.stringify(b.transaction_items))}', '${b.receipt_no}', '${b.customer_name}')" class="btn btn-primary" style="margin-top:15px;">Proses Pelunasan & Cetak</button>`;
                }

                const tglFormat = new Date(b.booking_date).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                let itemsHtml = b.transaction_items.map(i => `• <span style="font-weight:600;">${i.qty}x</span> ${i.products.name}`).join('<br>');

                list.innerHTML += `
                    <div class="card-booking" ${isCompleted ? 'style="opacity: 0.7;"' : ''}>
                        ${badgeStatus}
                        <h3 style="margin-top: 0; margin-bottom: 8px; color:#8b1a1a; font-size:16px;">Jadwal: ${tglFormat}</h3>
                        <p style="margin: 0; font-size: 12px; color: #6e6e6e; font-family: monospace; letter-spacing:0.5px;">Ref: ${b.receipt_no}</p>
                        <hr style="border:0; border-top:1px dashed #dcdcdc; margin: 15px 0;">
                        <div style="margin-bottom: 12px;">
                            <p style="margin: 3px 0; color:#1a1a1a; font-weight:600;">Pelanggan: ${b.customer_name || '-'}</p>
                            <p style="margin: 3px 0; color:#6e6e6e; font-size:13px;">Kontak: ${b.customer_wa || '-'}</p>
                            <p style="margin: 3px 0; color:#0288d1; font-weight:700; font-size:13px;">Pengambilan: Arasa ${b.pickup_branch}</p>
                        </div>
                        <div style="margin: 15px 0; font-size: 13px; line-height:1.6; color:#4a4a4a; background:#ffffff; padding:10px; border-radius:6px; border:1px solid #eeeeee;">${itemsHtml}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                            <span style="font-size:12px; color:#6e6e6e;">Nilai Transaksi</span>
                            <h3 style="margin: 0; color:#1a1a1a;">Rp ${b.total_amount.toLocaleString('id-ID')}</h3>
                        </div>
                        ${btnAksi}
                    </div>`;
            });
        }

        function filterBooking() {
            const key = document.getElementById('search-booking').value.toLowerCase();
            const filtered = dataBookingAsli.filter(b => (b.customer_name && b.customer_name.toLowerCase().includes(key)) || (b.customer_wa && b.customer_wa.includes(key)) || b.receipt_no.toLowerCase().includes(key));
            renderBooking(filtered);
        }

        function siapkanLunas(id, total, itemsStr, nota, custName) {
            gTrxId = id; gTotal = total; gReceipt = nota; gCustName = custName; gItems = JSON.parse(decodeURIComponent(itemsStr));
            document.getElementById('teks-total-modal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('modalTipeBayar').style.display = 'flex';
        }

        function bukaModalCash() {
            tutupModal('modalTipeBayar'); document.getElementById('teks-total-cash').innerText = `Rp ${gTotal.toLocaleString('id-ID')}`;
            document.getElementById('input-uang-pas').value = ''; document.getElementById('teks-kembalian').innerText = 'Rp 0';
            document.getElementById('btn-konfirm-cash').disabled = true; document.getElementById('modalCash').style.display = 'flex';
        }

        function hitungKembalian() {
            let uang = Number(document.getElementById('input-uang-pas').value); let btn = document.getElementById('btn-konfirm-cash');
            if (uang >= gTotal) { document.getElementById('teks-kembalian').innerText = `Rp ${(uang - gTotal).toLocaleString('id-ID')}`; document.getElementById('teks-kembalian').style.color = '#2e7d32'; btn.disabled = false; } 
            else { document.getElementById('teks-kembalian').innerText = `Defisit Nominal`; document.getElementById('teks-kembalian').style.color = '#dc3545'; btn.disabled = true; }
        }

        function cetakStrukLokal(noNota, custName, tipeBayar, total, uangCash, items) {
            const tgl = new Date().toLocaleString('id-ID');
            const myName = localStorage.getItem('userName') || 'Admin';
            let strukHTML = `
                <div style="width: 58mm; margin: 0 auto; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: black; padding: 5px;">
                    <div style="text-align: center; margin-bottom: 10px;">
                        <h2 style="margin: 0; font-size: 16px;">ARASA STORE</h2>
                        <h3 style="margin: 2px 0; font-size: 13px; color: #333;">CABANG ${localStorage.getItem('userBranch') || 'PUSAT'}</h3>
                        <hr style="border-top: 1px dashed black; margin: 5px 0;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <p style="margin: 2px 0;">Nota : ${noNota}</p>
                        <p style="margin: 2px 0;">Kasir: ${myName}</p>
                        <p style="margin: 2px 0;">Waktu: ${tgl}</p>
                        <p style="margin: 2px 0;">Cust : ${custName || 'Umum'}</p>
                        <hr style="border-top: 1px dashed black; margin: 5px 0;">
                    </div>
                    <table style="width: 100%; text-align: left; border-collapse: collapse; font-size: 12px;">`;

            items.forEach(item => { 
                let hrg = item.price || 0;
                strukHTML += `<tr><td colspan="3" style="padding-bottom: 2px;">${item.products.name}</td></tr><tr><td style="width: 20%; padding-bottom: 5px;">${item.qty}x</td><td style="width: 40%; padding-bottom: 5px;">${hrg.toLocaleString('id-ID')}</td><td style="width: 40%; text-align: right; padding-bottom: 5px;">${(hrg * item.qty).toLocaleString('id-ID')}</td></tr>`; 
            });

            strukHTML += `
                    </table>
                    <hr style="border-top: 1px dashed black; margin: 5px 0;">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;"><span>TOTAL:</span><span>Rp ${total.toLocaleString('id-ID')}</span></div>
                    <div style="display: flex; justify-content: space-between; margin-top: 5px;"><span>Bayar (${tipeBayar}):</span><span>Rp ${tipeBayar === 'Cash' ? uangCash.toLocaleString('id-ID') : total.toLocaleString('id-ID')}</span></div>`;
            
            if (tipeBayar === 'Cash') { strukHTML += `<div style="display: flex; justify-content: space-between;"><span>Kembali:</span><span>Rp ${(uangCash - total).toLocaleString('id-ID')}</span></div>`; }
            
            strukHTML += `
                    <hr style="border-top: 1px dashed black; margin: 10px 0;">
                    <div style="text-align: center;"><p style="margin: 0; font-size: 11px;">Terima Kasih Atas Kunjungan Anda!</p></div>
                </div>`;

            const printArea = document.getElementById('print-area'); printArea.innerHTML = strukHTML; printArea.style.display = 'block'; window.print(); printArea.style.display = 'none'; 
        }

        async function prosesLunas(metode) {
            try {
                await supabaseClient.from('transactions').update({ status: 'paid' }).eq('id', gTrxId);
                for (const item of gItems) {
                    await supabaseClient.from('products').update({ stock: item.products.stock - item.qty }).eq('id', item.product_id);
                    await supabaseClient.from('stock_logs').insert([{ product_id: item.product_id, change_qty: -item.qty, reason: 'sales_booking_lunas' }]);
                }
                
                let uang = 0;
                if(metode === 'Cash') { uang = Number(document.getElementById('input-uang-pas').value); }
                
                // CETAK STRUK LOKAL
                cetakStrukLokal(gReceipt, gCustName, metode, gTotal, uang, gItems);

                alert(`Booking berhasil dilunasi via ${metode}. Data tersimpan di sistem.`);
                tutupModal('modalTipeBayar'); tutupModal('modalCash'); loadBooking();
            } catch (err) { alert("Sistem gagal memproses pelunasan."); }
        }

        // FUNGSI SAKTI: PENGHANCUR ANTRIAN KDS
        async function tandaiDiambil(trxId) {
            if(confirm("Tandai pesanan ini sudah diambil pelanggan?")) {
                try {
                    // 1. Ubah status transaksi jadi completed (Tercatat selesai)
                    await supabaseClient.from('transactions').update({ status: 'completed' }).eq('id', trxId);
                    
                    // 2. MUSNAHKAN DARI KDS DAPUR: Paksa status kds_queue jadi done
                    await supabaseClient.from('kds_queue').update({ status: 'done' }).eq('transaction_id', trxId);
                    
                    alert("Pesanan telah selesai diambil. Antrean di dapur (jika ada) otomatis dihapus.");
                    loadBooking();
                } catch (e) {
                    alert("Gagal memproses.");
                }
            }
        }

        loadBooking();
    </script>
</body>
</html>
