<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hold Payment - Arasa Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style> 
        table { width: 100%; border-collapse: collapse; } th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; } th { background: #f8f9fa; } 
        /* CSS Modal Global */
        .web-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .web-modal-content { background: white; padding: 25px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 15px; }
        .input-nominal { width: 100%; padding: 15px; font-size: 20px; text-align: center; font-weight: bold; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div style="background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px;">
        <a href="index.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">🛒 Kasir Utama</a>
        <a href="kasir_waiting.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">📢 Waiting List Dadakan</a>
        <a href="kasir_hold.html" class="btn-success" style="text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; font-weight: bold;">⏸️ List Hold</a>
        <a href="kasir_order.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">📦 Order Pusat</a>
    </div>

    <div class="container" style="display: block;">
        <div class="menu-section" style="height: 100%;">
            <h2>Daftar Transaksi Belum Lunas (Hold)</h2>
            <table>
                <thead><tr><th>No. Nota</th><th>Nama Pelanggan</th><th>Total Tagihan</th><th>Aksi</th></tr></thead>
                <tbody id="hold-list"><tr><td colspan="4">Memuat data...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="modalConfirm" class="web-modal"><div class="web-modal-content"><h3 id="teks-confirm">Yakin?</h3><div style="display:flex; gap:10px; margin-top:15px;"><button id="btn-confirm-yes" class="modal-btn btn-success">Ya</button><button class="modal-btn" style="background:#6c757d; color:white;" onclick="tutupModal('modalConfirm')">Batal</button></div></div></div>
    
    <div id="modalTipeBayar" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0;">Pelunasan Nota</h2><p style="color:#666;">Total: <strong style="font-size: 20px; color:#dc3545;" id="teks-total-modal">Rp 0</strong></p><div style="display:flex; gap:10px; margin-top: 20px;"><button class="modal-btn btn-success" onclick="bukaModalCash()">💵 Cash</button><button class="modal-btn" style="background: #007bff; color: white;" onclick="prosesPelunasan('Non-Cash')">💳 Non-Cash</button></div><button class="modal-btn" style="background: #6c757d; color: white; margin-top: 10px;" onclick="tutupModal('modalTipeBayar')">Batal</button></div></div>

    <div id="modalCash" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0;">Pembayaran Cash</h2><p style="color:#666;">Total: <strong style="font-size: 18px;" id="teks-total-cash">Rp 0</strong></p><input type="number" id="input-uang-pas" class="input-nominal" placeholder="Nominal Uang..." onkeyup="hitungKembalian()"><h3 id="teks-kembalian" style="color: #28a745; margin: 10px 0;">Kembalian: Rp 0</h3><button id="btn-konfirm-cash" class="modal-btn btn-success" onclick="prosesPelunasan('Cash')" disabled>Konfirmasi & Cetak Nota</button><button class="modal-btn" style="background: #6c757d; color: white;" onclick="tutupModal('modalCash')">Kembali</button></div></div>

    <div id="modalSukses" class="web-modal"><div class="web-modal-content"><h1 style="font-size: 50px; margin: 0;">✅</h1><h2 id="judul-sukses">Berhasil!</h2><p id="pesan-sukses" style="color: #555; font-size: 14px; white-space: pre-wrap;"></p><button class="modal-btn btn-success" onclick="tutupSemuaDanReload()">OK</button></div></div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        
        let globalTrxId = null; let globalReceiptNo = null; let globalTotal = 0; let globalItems = [];

        function tutupModal(id) { document.getElementById(id).style.display = 'none'; }
        
        async function loadHold() {
            const { data, error } = await supabaseClient.from('transactions').select('id, receipt_no, customer_name, total_amount, transaction_items(qty, product_id, products(name, type, stock))').eq('status', 'hold').order('created_at', { ascending: false });
            const tbody = document.getElementById('hold-list'); tbody.innerHTML = '';
            if (error || !data || data.length === 0) return tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Tidak ada transaksi Hold.</td></tr>';

            data.forEach(trx => {
                const itemsData = encodeURIComponent(JSON.stringify(trx.transaction_items));
                tbody.innerHTML += `
                    <tr>
                        <td style="font-family: monospace; font-weight:bold;">${trx.receipt_no}</td>
                        <td>${trx.customer_name || '-'}</td>
                        <td style="color: red; font-weight: bold;">Rp ${trx.total_amount.toLocaleString('id-ID')}</td>
                        <td>
                            <button onclick="window.location.href='index.html?edit_hold=${trx.id}'" style="background: #ffc107; color: black; margin: 0; padding: 5px 10px; font-size: 12px; width: auto; border:none; cursor:pointer; border-radius:3px; font-weight:bold;">✏️ Edit</button>
                            <button onclick="siapkanPelunasan('${trx.id}', '${trx.receipt_no}', ${trx.total_amount}, '${itemsData}')" style="background: #28a745; color: white; margin: 0 0 0 5px; padding: 5px 10px; font-size: 12px; width: auto; border:none; cursor:pointer; border-radius:3px; font-weight:bold;">💰 Bayar Lunas</button>
                        </td>
                    </tr>`;
            });
        }

        function siapkanPelunasan(id, nota, total, itemsStr) {
            globalTrxId = id; globalReceiptNo = nota; globalTotal = total; globalItems = JSON.parse(decodeURIComponent(itemsStr));
            document.getElementById('teks-total-modal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('modalTipeBayar').style.display = 'flex';
        }

        function bukaModalCash() {
            tutupModal('modalTipeBayar');
            document.getElementById('teks-total-cash').innerText = `Rp ${globalTotal.toLocaleString('id-ID')}`;
            document.getElementById('input-uang-pas').value = '';
            document.getElementById('teks-kembalian').innerText = 'Kembalian: Rp 0';
            document.getElementById('btn-konfirm-cash').disabled = true;
            document.getElementById('modalCash').style.display = 'flex';
        }

        function hitungKembalian() {
            let uang = Number(document.getElementById('input-uang-pas').value);
            let btn = document.getElementById('btn-konfirm-cash');
            if (uang >= globalTotal) {
                document.getElementById('teks-kembalian').innerText = `Kembalian: Rp ${(uang - globalTotal).toLocaleString('id-ID')}`;
                document.getElementById('teks-kembalian').style.color = '#28a745'; btn.disabled = false;
            } else {
                document.getElementById('teks-kembalian').innerText = `Uang Kurang!`; document.getElementById('teks-kembalian').style.color = 'red'; btn.disabled = true;
            }
        }

        async function prosesPelunasan(metode) {
            try {
                await supabaseClient.from('transactions').update({ status: 'paid' }).eq('id', globalTrxId);
                for (const item of globalItems) {
                    await supabaseClient.from('products').update({ stock: item.products.stock - item.qty }).eq('id', item.product_id);
                    await supabaseClient.from('stock_logs').insert([{ product_id: item.product_id, change_qty: -item.qty, reason: 'sales_from_hold' }]);
                }

                let pesan = `Nota: ${globalReceiptNo}\nMetode: ${metode}`;
                if(metode === 'Cash') {
                    let uang = Number(document.getElementById('input-uang-pas').value);
                    pesan += `\nUang Diterima: Rp ${uang.toLocaleString('id-ID')}\nKembalian: Rp ${(uang - globalTotal).toLocaleString('id-ID')}`;
                }
                
                tutupModal('modalTipeBayar'); tutupModal('modalCash');
                document.getElementById('pesan-sukses').innerText = pesan;
                document.getElementById('modalSukses').style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        function tutupSemuaDanReload() { tutupModal('modalSukses'); loadHold(); }

        loadHold();
    </script>
</body>
</html>
