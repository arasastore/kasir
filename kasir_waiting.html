<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting List KDS - Arasa Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .web-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .web-modal-content { background: white; padding: 25px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 15px; }
        .input-nominal { width: 100%; padding: 15px; font-size: 20px; text-align: center; font-weight: bold; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        .btn-item-done { background: #ffc107; color: black; padding: 2px 8px; border: none; border-radius: 3px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div style="background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px;">
        <a href="index.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">🛒 Kasir Utama</a>
        <a href="kasir_waiting.html" class="btn-success" style="text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; font-weight: bold;">📢 Waiting List Dadakan</a>
        <a href="kasir_hold.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">⏸️ List Hold</a>
        <a href="kasir_order.html" style="background: #eee; text-decoration: none; padding: 10px; border-radius: 5px; flex: 1; text-align: center; color: #333; font-weight: bold;">📦 Order Pusat</a>
    </div>

    <div class="container" style="display: block;">
        <div class="menu-section" style="height: 100%;">
            <h2>Daftar Antrean Produksi (Dadakan)</h2>
            <div id="queue-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"><p>Memuat antrean...</p></div>
        </div>
    </div>

    <div id="modalConfirm" class="web-modal"><div class="web-modal-content"><h3 id="teks-confirm">Yakin?</h3><div style="display:flex; gap:10px; margin-top:15px;"><button id="btn-confirm-yes" class="modal-btn btn-success">Ya</button><button class="modal-btn" style="background:#6c757d; color:white;" onclick="tutupModal('modalConfirm')">Batal</button></div></div></div>
    <div id="modalTipeBayar" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0;">Bayar Hold Payment</h2><p style="color:#666;">Total: <strong style="font-size: 20px; color:#dc3545;" id="teks-total-modal">Rp 0</strong></p><div style="display:flex; gap:10px; margin-top: 20px;"><button class="modal-btn btn-success" onclick="bukaModalCash()">💵 Cash</button><button class="modal-btn" style="background: #007bff; color: white;" onclick="prosesSelesaiKDS('Non-Cash')">💳 Non-Cash</button></div><button class="modal-btn" style="background: #6c757d; color: white; margin-top: 10px;" onclick="tutupModal('modalTipeBayar')">Batal</button></div></div>
    <div id="modalCash" class="web-modal"><div class="web-modal-content"><h2 style="margin-top:0;">Pembayaran Cash</h2><p style="color:#666;">Total: <strong style="font-size: 18px;" id="teks-total-cash">Rp 0</strong></p><input type="number" id="input-uang-pas" class="input-nominal" placeholder="Nominal Uang..." onkeyup="hitungKembalian()"><h3 id="teks-kembalian" style="color: #28a745; margin: 10px 0;">Kembalian: Rp 0</h3><button id="btn-konfirm-cash" class="modal-btn btn-success" onclick="prosesSelesaiKDS('Cash')" disabled>Konfirmasi & Cetak Nota</button><button class="modal-btn" style="background: #6c757d; color: white;" onclick="tutupModal('modalCash')">Kembali</button></div></div>
    <div id="modalSukses" class="web-modal"><div class="web-modal-content"><h1 style="font-size: 50px; margin: 0;">✅</h1><h2 id="judul-sukses">Berhasil!</h2><p id="pesan-sukses" style="color: #555; font-size: 14px; white-space: pre-wrap;"></p><button class="modal-btn btn-success" onclick="tutupSemuaDanReload()">OK</button></div></div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        
        let itemSelesaiMemory = {}; 
        let dataQueueGlobal = [];
        let gQueueId = null, gTrxId = null, gTotal = 0, gItems = [], gReceipt = '';

        function tutupModal(id) { document.getElementById(id).style.display = 'none'; }
        
        let confirmCallback = null;
        function tampilkanConfirm(pesan, callback) {
            document.getElementById('teks-confirm').innerText = pesan; confirmCallback = callback;
            document.getElementById('modalConfirm').style.display = 'flex';
        }
        document.getElementById('btn-confirm-yes').onclick = () => { tutupModal('modalConfirm'); if(confirmCallback) confirmCallback(); }

        async function loadQueue() {
            const { data, error } = await supabaseClient.from('kds_queue')
                .select(`id, status, transactions (id, receipt_no, customer_name, status, total_amount, transaction_items(qty, product_id, products(name, type, stock)))`)
                .eq('status', 'waiting');
            if (error) return; dataQueueGlobal = data; renderKDSLayar();
        }

        function renderKDSLayar() {
            const queueList = document.getElementById('queue-list'); queueList.innerHTML = '';
            if (dataQueueGlobal.length === 0) return queueList.innerHTML = '<p>Tidak ada antrean.</p>';

            dataQueueGlobal.forEach(q => {
                const trx = q.transactions;
                const badgeColor = trx.status === 'paid' ? 'green' : 'orange';
                const statusText = trx.status === 'paid' ? 'LUNAS' : 'HOLD PAYMENT';
                
                let textToRead = `Order atas nama Kak ${trx.customer_name}, ${trx.transaction_items.map(i => `${i.qty} ${i.products.name}`).join(', ')}. Silakan menuju kasir.`;
                let itemsHtml = ''; let semuaItemSelesai = true;

                trx.transaction_items.forEach((i, idx) => {
                    let isReady = i.products.type !== 'dadakan'; // Barang ready otomatis selesai
                    let isDone = isReady || (itemSelesaiMemory[q.id] && itemSelesaiMemory[q.id].includes(idx));
                    if (!isDone) semuaItemSelesai = false;

                    let btnAksi = isDone ? `<span style="color:#28a745; font-weight:bold; font-size:12px;">✅</span>` 
                                         : `<button class="btn-item-done" onclick="tandaiItemSelesai('${q.id}', ${idx})">Done</button>`;
                    
                    itemsHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; align-items:center; border-bottom:1px dashed #eee; padding-bottom:3px;">
                        <span style="font-size:13px;">• ${i.qty}x ${i.products.name}</span>${btnAksi}
                    </div>`;
                });

                const btnUtamaDisabled = semuaItemSelesai ? '' : 'disabled style="background:#aaa; cursor:not-allowed;"';
                const itemsDataStr = encodeURIComponent(JSON.stringify(trx.transaction_items));

                queueList.innerHTML += `
                    <div class="card" style="text-align: left; position: relative;">
                        <span style="position: absolute; top: 10px; right: 10px; background: ${badgeColor}; color: white; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: bold;">${statusText}</span>
                        <h3 style="margin-top: 0;">${trx.customer_name || 'Tanpa Nama'}</h3>
                        <p style="font-size: 12px; color: #666; margin-bottom: 10px;">${trx.receipt_no}</p>
                        <div style="margin-bottom: 15px;">${itemsHtml}</div>
                        <div style="display: flex; gap: 5px;">
                            <button onclick="panggilSuara('${textToRead}')" style="background: #007bff; color: white; margin:0; flex:1;">🔊 Panggil</button>
                            <button onclick="triggerSelesaiKDS('${q.id}', '${trx.id}', '${trx.status}', ${trx.total_amount}, '${trx.receipt_no}', '${itemsDataStr}')" class="btn-success" style="margin:0; flex:1;" ${btnUtamaDisabled}>✅ Selesai</button>
                        </div>
                    </div>`;
            });
        }

        function tandaiItemSelesai(queueId, itemIdx) {
            if (!itemSelesaiMemory[queueId]) itemSelesaiMemory[queueId] = [];
            itemSelesaiMemory[queueId].push(itemIdx); renderKDSLayar(); 
        }

        function panggilSuara(teks) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(teks); utterance.lang = 'id-ID'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else alert("Browser tidak mendukung suara.");
        }

        function triggerSelesaiKDS(qId, tId, status, total, nota, itemsStr) {
            if (status === 'paid') {
                tampilkanConfirm("Selesaikan antrean ini dan hapus dari layar KDS?", async () => {
                    await supabaseClient.from('kds_queue').update({ status: 'done' }).eq('id', qId);
                    loadQueue();
                });
            } else {
                gQueueId = qId; gTrxId = tId; gTotal = total; gReceipt = nota; gItems = JSON.parse(decodeURIComponent(itemsStr));
                document.getElementById('teks-total-modal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
                document.getElementById('modalTipeBayar').style.display = 'flex';
            }
        }

        function bukaModalCash() {
            tutupModal('modalTipeBayar'); document.getElementById('teks-total-cash').innerText = `Rp ${gTotal.toLocaleString('id-ID')}`;
            document.getElementById('input-uang-pas').value = ''; document.getElementById('teks-kembalian').innerText = 'Kembalian: Rp 0';
            document.getElementById('btn-konfirm-cash').disabled = true; document.getElementById('modalCash').style.display = 'flex';
        }

        function hitungKembalian() {
            let uang = Number(document.getElementById('input-uang-pas').value); let btn = document.getElementById('btn-konfirm-cash');
            if (uang >= gTotal) { document.getElementById('teks-kembalian').innerText = `Kembalian: Rp ${(uang - gTotal).toLocaleString('id-ID')}`; document.getElementById('teks-kembalian').style.color = '#28a745'; btn.disabled = false; } 
            else { document.getElementById('teks-kembalian').innerText = `Uang Kurang!`; document.getElementById('teks-kembalian').style.color = 'red'; btn.disabled = true; }
        }

        async function prosesSelesaiKDS(metode) {
            try {
                await supabaseClient.from('transactions').update({ status: 'paid' }).eq('id', gTrxId);
                await supabaseClient.from('kds_queue').update({ status: 'done' }).eq('id', gQueueId);
                for (const item of gItems) {
                    await supabaseClient.from('products').update({ stock: item.products.stock - item.qty }).eq('id', item.product_id);
                    await supabaseClient.from('stock_logs').insert([{ product_id: item.product_id, change_qty: -item.qty, reason: 'sales_from_kds_hold' }]);
                }
                let pesan = `Nota: ${gReceipt}\nMetode: ${metode}\nKDS Selesai!`;
                if(metode === 'Cash') {
                    let uang = Number(document.getElementById('input-uang-pas').value);
                    pesan += `\nUang: Rp ${uang.toLocaleString('id-ID')}\nKembalian: Rp ${(uang - gTotal).toLocaleString('id-ID')}`;
                }
                tutupModal('modalTipeBayar'); tutupModal('modalCash');
                document.getElementById('pesan-sukses').innerText = pesan;
                document.getElementById('modalSukses').style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        function tutupSemuaDanReload() { tutupModal('modalSukses'); loadQueue(); }

        setInterval(loadQueue, 5000); 
        loadQueue();
    </script>
</body>
</html>
