<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan - Arasa Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #2b2b2b; font-size: 14px; line-height: 1.6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; border-left: 6px solid #8b1a1a; }
        .header-title h2 { font-size: 22px; color: #1a1a1a; font-weight: 700; letter-spacing: 0.5px; }
        .header-subtitle { color: #6e6e6e; font-size: 13px; font-weight: 600; margin-top: 4px; display: block; }
        .nav-tabs { display: flex; gap: 25px; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs a { text-decoration: none; color: #6e6e6e; font-weight: 600; font-size: 14px; transition: 0.3s; position: relative; padding-bottom: 12px; }
        .nav-tabs a:hover, .nav-tabs a.active { color: #8b1a1a; }
        .nav-tabs a.active::after { content: ''; position: absolute; bottom: -13px; left: 0; width: 100%; height: 3px; background-color: #8b1a1a; border-radius: 3px 3px 0 0; }
        .badge-count { background: #8b1a1a; color: #ffffff; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 6px; display: none; vertical-align: middle; }
        .card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .card-title { font-size: 16px; color: #1a1a1a; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid #eeeeee; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #4a4a4a; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #dcdcdc; border-radius: 8px; font-size: 14px; color: #2b2b2b; transition: 0.2s; outline: none; background: #fff; }
        .form-control:focus { border-color: #8b1a1a; box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.05); }
        textarea.form-control { resize: vertical; min-height: 80px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-primary { background: #8b1a1a; color: #ffffff; width: 100%; height: 46px; }
        .btn-primary:hover { background: #6b1414; }
        .btn-outline { background: transparent; color: #8b1a1a; border: 1px solid #8b1a1a; }
        .btn-outline:hover { background: #8b1a1a; color: #ffffff; }
        .web-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .web-modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 15px; } .header .btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h2>Konfigurasi Sistem</h2>
                <span id="user-info" class="header-subtitle">Memuat data...</span>
            </div>
            <button onclick="logout()" class="btn btn-outline">Logout Sistem</button>
        </div>

        <div class="nav-tabs">
            <a href="admin.html">Dashboard</a>
            <a href="admin_kas.html">Buku Kas</a>
            <a href="admin_menu.html">Menu & Stok</a>
            <a href="admin_gudang.html">Stok Gudang</a>
            <a href="admin_toko.html">Stok Etalase</a>
            <a href="admin_order.html">Order Cabang <span id="badge-order" class="badge-count"></span></a>
            <a href="admin_req_dapur.html">Req Dapur <span id="badge-dapur" class="badge-count"></span></a>
            <a href="admin_req_trx.html">Req Transaksi <span id="badge-trx" class="badge-count"></span></a>
            <a href="admin_notif.html">Notifikasi <span id="badge-notif" class="badge-count"></span></a>
            <a href="admin_akun.html">Manajemen Akun</a>
            <a href="admin_setting.html" class="active">Pengaturan</a>
        </div>

        <div class="card">
            <h3 class="card-title">Pengaturan Format Cetak Struk</h3>
            <div class="form-group"><label>Nama Toko (Bagian Header Struk)</label><input type="text" id="store-name" class="form-control" placeholder="Contoh: ARASA STORE PUSAT"></div>
            <div class="form-group"><label>Alamat & Kontak (Bagian Sub-Header Struk)</label><textarea id="store-address" class="form-control" placeholder="Contoh: Jl. Raya Pusat No. 1&#10;Telp: 08123456789"></textarea></div>
            <div class="form-group"><label>Pesan Penutup (Bagian Footer Struk)</label><textarea id="footer-message" class="form-control" placeholder="Contoh: Terima Kasih Atas Kunjungan Anda"></textarea></div>
            <div class="form-group">
                <label>Ukuran Kertas Printer Thermal</label>
                <select id="paper-size" class="form-control">
                    <option value="58mm">58mm (Printer Kecil Mobile)</option>
                    <option value="80mm">80mm (Printer Besar Kasir)</option>
                </select>
            </div>
            <button onclick="saveSettings()" class="btn btn-primary">Simpan & Terapkan Konfigurasi</button>
        </div>
    </div>

    <div id="modalAlert" class="web-modal">
        <div class="web-modal-content">
            <h2 id="alert-title" style="margin-top:0; color:#1a1a1a; margin-bottom:10px;">Info</h2>
            <p id="alert-message" style="color:#6e6e6e; line-height: 1.5; margin-bottom:20px;"></p>
            <button onclick="document.getElementById('modalAlert').style.display='none'" class="btn btn-primary">Tutup</button>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        const role = localStorage.getItem('userRole');
        if (role !== 'admin_pusat' && role !== 'admin' && role !== 'admin_cabang') window.location.href = 'login.html';
        document.getElementById('user-info').innerText = `Otoritas: ${(role === 'admin' || role === 'admin_pusat') ? 'Admin Pusat' : 'Admin Cabang'} | Area: Arasa ${localStorage.getItem('userBranch') || 'Pusat'}`;

        function showAlert(t, m) { document.getElementById('alert-title').innerText = t; document.getElementById('alert-message').innerText = m; document.getElementById('modalAlert').style.display = 'flex'; }

        async function loadSettings() {
            const { data } = await supabaseClient.from('store_settings').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('store-name').value = data.store_name || '';
                document.getElementById('store-address').value = data.store_address || '';
                document.getElementById('footer-message').value = data.footer_message || '';
                document.getElementById('paper-size').value = data.paper_size || '58mm';
            }
            updateBadges();
        }

        async function saveSettings() {
            const updates = { store_name: document.getElementById('store-name').value, store_address: document.getElementById('store-address').value, footer_message: document.getElementById('footer-message').value, paper_size: document.getElementById('paper-size').value };
            try {
                const { data } = await supabaseClient.from('store_settings').select('id').eq('id', 1).single();
                if (data) await supabaseClient.from('store_settings').update(updates).eq('id', 1);
                else await supabaseClient.from('store_settings').insert([{ id: 1, ...updates }]);
                showAlert("Sukses", "Format struk berhasil diperbarui dan diterapkan ke seluruh cabang.");
            } catch (err) { showAlert("Error", "Sistem gagal merekam konfigurasi."); }
        }

        async function updateBadges() {
            try {
                const { count: cNotif } = await supabaseClient.from('notifications').select('*', { count: 'exact', head: true }).eq('is_read', false);
                const { count: cOrder } = await supabaseClient.from('order_cabang').select('*', { count: 'exact', head: true }).eq('status', 'request');
                const { count: cDapur } = await supabaseClient.from('belanja_harian').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const { count: cTrx } = await supabaseClient.from('request_trx').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const setB = (id, v) => { const e = document.getElementById(id); if(e){ e.innerText = v > 99 ? '99+' : v; e.style.display = v > 0 ? 'inline-block' : 'none'; } };
                setB('badge-notif', cNotif); setB('badge-order', cOrder); setB('badge-dapur', cDapur); setB('badge-trx', cTrx);
            } catch(e) {}
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        loadSettings();
    </script>
</body>
</html>
