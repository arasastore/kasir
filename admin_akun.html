<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Akun - Arasa Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #2b2b2b; font-size: 14px; line-height: 1.6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; border-left: 6px solid #8b1a1a; }
        .header-title h2 { font-size: 22px; color: #1a1a1a; font-weight: 700; letter-spacing: 0.5px; }
        .header-subtitle { color: #6e6e6e; font-size: 13px; font-weight: 600; margin-top: 4px; display: block; }
        .nav-tabs { display: flex; gap: 25px; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs a { text-decoration: none; color: #6e6e6e; font-weight: 600; font-size: 14px; transition: 0.3s; position: relative; padding-bottom: 12px; }
        .nav-tabs a:hover, .nav-tabs a.active { color: #8b1a1a; }
        .nav-tabs a.active::after { content: ''; position: absolute; bottom: -13px; left: 0; width: 100%; height: 3px; background-color: #8b1a1a; border-radius: 3px 3px 0 0; }
        .badge-count { background: #8b1a1a; color: #ffffff; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 6px; display: none; vertical-align: middle; }
        .card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .card-title { font-size: 16px; color: #1a1a1a; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid #eeeeee; padding-bottom: 10px; }
        .form-row { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #4a4a4a; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #dcdcdc; border-radius: 8px; font-size: 14px; color: #2b2b2b; transition: 0.2s; outline: none; background: #fff; }
        .form-control:focus { border-color: #8b1a1a; box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.05); }
        .form-control:disabled { background: #f0f0f0; cursor: not-allowed; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-primary { background: #8b1a1a; color: #ffffff; }
        .btn-primary:hover { background: #6b1414; }
        .btn-outline { background: transparent; color: #8b1a1a; border: 1px solid #8b1a1a; }
        .btn-outline:hover { background: #8b1a1a; color: #ffffff; }
        .btn-danger { background: #ffebeb; color: #dc3545; }
        .btn-danger:hover { background: #dc3545; color: #ffffff; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eeeeee; }
        th { background: #fafafa; font-weight: 600; color: #4a4a4a; font-size: 13px; text-transform: uppercase; }
        td { font-size: 14px; color: #2b2b2b; }
        .web-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .web-modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 15px; } .header .btn { width: 100%; } .form-row { flex-direction: column; align-items: stretch; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h2>Manajemen Akun Global</h2>
                <span id="user-info" class="header-subtitle">Memuat data...</span>
            </div>
            <button onclick="logout()" class="btn btn-outline">Logout Sistem</button>
        </div>

        <div class="nav-tabs">
            <a href="admin.html">Dashboard</a>
            <a href="admin_kas.html">Buku Kas</a>
            <a href="admin_menu.html">Menu & Stok</a>
            <a href="admin_gudang.html">Stok Gudang</a>
            <a href="admin_toko.html">Stok Etalase</a>
            <a href="admin_order.html">Order Cabang <span id="badge-order" class="badge-count"></span></a>
            <a href="admin_req_dapur.html">Req Dapur <span id="badge-dapur" class="badge-count"></span></a>
            <a href="admin_req_trx.html">Req Transaksi <span id="badge-trx" class="badge-count"></span></a>
            <a href="admin_notif.html">Notifikasi <span id="badge-notif" class="badge-count"></span></a>
            <a href="admin_akun.html" class="active">Manajemen Akun</a>
            <a href="admin_setting.html">Pengaturan</a>
        </div>

        <div class="card">
            <h3 class="card-title">Tambah Akun Baru</h3>
            <div class="form-row">
                <div class="form-group"><label>Nama Staf</label><input type="text" id="add-name" class="form-control" placeholder="Contoh: Elok"></div>
                <div class="form-group"><label>PIN Akses</label><input type="password" id="add-pin" class="form-control" placeholder="****"></div>
                <div class="form-group">
                    <label>Role / Otoritas</label>
                    <select id="add-role" class="form-control">
                        <option value="kasir">Kasir Cabang</option>
                        <option value="admin_pusat">Admin Pusat</option>
                        <option value="produksi_p1">Dapur P1 (Utama)</option>
                        <option value="produksi_p3">Dapur P3 (Brownies)</option>
                        <option value="produksi_p4">Dapur P4 (Oven)</option>
                        <option value="produksi_goreng">Dapur Goreng (KDS)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Lokasi / Cabang</label>
                    <select id="add-branch" class="form-control">
                        <option value="Pusat">Arasa Pusat</option>
                        <option value="Gatoel">Arasa Gatoel</option>
                        <option value="Stasiun">Arasa Stasiun</option>
                    </select>
                </div>
                <div class="form-group"><button onclick="tambahAkun()" class="btn btn-primary" style="width:100%; height:46px;">Daftar Akun</button></div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">Daftar Akun Terdaftar</h3>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Display Name</th><th>Lokasi</th><th>Role</th><th>PIN</th><th>Aksi</th></tr></thead>
                    <tbody id="user-list"><tr><td colspan="5" style="text-align:center; color:#6e6e6e;">Memuat data...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalAlert" class="web-modal">
        <div class="web-modal-content">
            <h2 id="alert-title" style="margin-top:0; color:#1a1a1a; margin-bottom:10px;">Info</h2>
            <p id="alert-message" style="color:#6e6e6e; line-height: 1.5; margin-bottom:20px;"></p>
            <button onclick="document.getElementById('modalAlert').style.display='none'" class="btn btn-primary" style="width:100%;">Tutup</button>
        </div>
    </div>
    
    <div id="modalConfirm" class="web-modal">
        <div class="web-modal-content">
            <h2 id="confirm-title" style="margin-top:0; color:#dc3545; margin-bottom:10px;">Konfirmasi</h2>
            <p id="confirm-message" style="color:#6e6e6e; line-height: 1.5; margin-bottom:20px;"></p>
            <div style="display: flex; gap: 10px;">
                <button id="btn-confirm-yes" class="btn btn-primary" style="background:#dc3545; flex:1;">Ya, Hapus</button>
                <button onclick="document.getElementById('modalConfirm').style.display='none'" class="btn btn-outline" style="flex:1;">Batal</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        if (localStorage.getItem('userRole') !== 'admin_pusat') window.location.href = 'login.html';
        document.getElementById('user-info').innerText = `Otoritas: Admin Pusat | Area: Arasa ${localStorage.getItem('userBranch') || 'Pusat'}`;

        document.getElementById('add-role').addEventListener('change', function() {
            const branchSelect = document.getElementById('add-branch');
            if (this.value !== 'kasir') { branchSelect.value = 'Pusat'; branchSelect.disabled = true; } 
            else { branchSelect.disabled = false; }
        });

        function showAlert(t, m) { document.getElementById('alert-title').innerText = t; document.getElementById('alert-message').innerText = m; document.getElementById('modalAlert').style.display = 'flex'; }
        let tempAction = null;
        function showConfirm(t, m, cb) { document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-message').innerText = m; tempAction = cb; document.getElementById('modalConfirm').style.display = 'flex'; }
        document.getElementById('btn-confirm-yes').addEventListener('click', () => { document.getElementById('modalConfirm').style.display = 'none'; if (tempAction) tempAction(); });

        async function loadUsers() {
            const { data } = await supabaseClient.from('users').select('*').order('created_at', { ascending: true });
            const tbody = document.getElementById('user-list'); tbody.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(u => {
                    let btn = (u.role === 'admin_pusat') ? '<span style="color:#aaa; font-size:12px; font-weight:700;">Akses Induk</span>' : `<button onclick="hapusAkun('${u.id}', '${u.name}')" class="btn btn-danger" style="padding: 6px 12px;">Hapus</button>`;
                    tbody.innerHTML += `<tr><td style="font-weight:600; color:#1a1a1a;">${u.name}</td><td style="color:#8b1a1a; font-weight:600;">${u.branch || 'Pusat'}</td><td>${u.role.toUpperCase().replace('_', ' ')}</td><td><span style="font-family:monospace; background:#fafafa; padding:4px 8px; border:1px solid #eee; border-radius:4px;">${u.pin}</span></td><td>${btn}</td></tr>`;
                });
            } else { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#6e6e6e;">Belum ada akun.</td></tr>'; }
            updateBadges();
        }

        async function tambahAkun() {
            const rawName = document.getElementById('add-name').value.trim(); const pin = document.getElementById('add-pin').value.trim();
            const role = document.getElementById('add-role').value; const branch = document.getElementById('add-branch').disabled ? 'Pusat' : document.getElementById('add-branch').value;
            if (!rawName || pin.length < 4) return showAlert("Peringatan", "Nama dan PIN (min. 4 digit) wajib diisi!");
            let labelRole = "Kasir"; 
            if (role === 'admin_pusat') labelRole = "Admin Pusat"; 
            if (role.startsWith('produksi_p')) labelRole = `Dapur ${role.replace('produksi_', '').toUpperCase()}`;
            if (role === 'produksi_goreng') labelRole = "KDS Goreng";
            const finalName = `${rawName} - ${labelRole} - Arasa ${branch}`;
            try { await supabaseClient.from('users').insert([{ name: finalName, pin, role, branch }]); document.getElementById('add-name').value = ''; document.getElementById('add-pin').value = ''; loadUsers(); showAlert("Sukses", `Akun ${finalName} didaftarkan.`); } 
            catch (err) { showAlert("Error", "Gagal mendaftarkan akun. PIN mungkin ganda."); }
        }

        function hapusAkun(id, name) { showConfirm("Hapus Akun?", `Yakin menghapus permanen "${name}"?`, async () => { try { await supabaseClient.from('users').delete().eq('id', id); loadUsers(); showAlert("Sukses", "Akun dihapus."); } catch (err) { showAlert("Error", "Gagal menghapus."); } }); }

        async function updateBadges() {
            try {
                const { count: cNotif } = await supabaseClient.from('notifications').select('*', { count: 'exact', head: true }).eq('is_read', false);
                const { count: cOrder } = await supabaseClient.from('order_cabang').select('*', { count: 'exact', head: true }).eq('status', 'request');
                const { count: cDapur } = await supabaseClient.from('belanja_harian').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const { count: cTrx } = await supabaseClient.from('request_trx').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const setB = (id, v) => { const e = document.getElementById(id); if(e){ e.innerText = v > 99 ? '99+' : v; e.style.display = v > 0 ? 'inline-block' : 'none'; } };
                setB('badge-notif', cNotif); setB('badge-order', cOrder); setB('badge-dapur', cDapur); setB('badge-trx', cTrx);
            } catch(e) {}
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        loadUsers();
    </script>
</body>
</html>
