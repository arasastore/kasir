<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Cabang - Arasa Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #2b2b2b; font-size: 14px; line-height: 1.6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; border-left: 6px solid #8b1a1a; }
        .header-title h2 { font-size: 22px; color: #1a1a1a; font-weight: 700; letter-spacing: 0.5px; }
        .header-subtitle { color: #6e6e6e; font-size: 13px; font-weight: 600; margin-top: 4px; display: block; }
        .nav-tabs { display: flex; gap: 25px; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs a { text-decoration: none; color: #6e6e6e; font-weight: 600; font-size: 14px; transition: 0.3s; position: relative; padding-bottom: 12px; }
        .nav-tabs a:hover, .nav-tabs a.active { color: #8b1a1a; }
        .nav-tabs a.active::after { content: ''; position: absolute; bottom: -13px; left: 0; width: 100%; height: 3px; background-color: #8b1a1a; border-radius: 3px 3px 0 0; }
        .badge-count { background: #8b1a1a; color: #ffffff; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 6px; display: none; vertical-align: middle; }
        .card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-primary { background: #8b1a1a; color: #ffffff; }
        .btn-primary:hover { background: #6b1414; }
        .btn-outline { background: transparent; color: #8b1a1a; border: 1px solid #8b1a1a; }
        .btn-outline:hover { background: #8b1a1a; color: #ffffff; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eeeeee; }
        th { background: #fafafa; font-weight: 600; color: #4a4a4a; font-size: 13px; text-transform: uppercase; }
        td { font-size: 14px; color: #2b2b2b; }
        .badge-status { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .bg-warning { background: #fff3cd; color: #856404; }
        .bg-info { background: #e3f2fd; color: #007bff; }
        .bg-success { background: #d4edda; color: #155724; }
        @media (max-width: 768px) { .header { flex-direction: column; align-items: flex-start; gap: 15px; } .header .btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h2>Manajemen Distribusi Cabang</h2>
                <span id="user-info" class="header-subtitle">Memuat data...</span>
            </div>
            <button onclick="logout()" class="btn btn-outline">Logout Sistem</button>
        </div>

        <div class="nav-tabs">
            <a href="admin.html">Dashboard</a>
            <a href="admin_kas.html">Buku Kas</a>
            <a href="admin_menu.html">Menu & Stok</a>
            <a href="admin_gudang.html">Stok Gudang</a>
            <a href="admin_toko.html">Stok Etalase</a>
            <a href="admin_order.html" class="active">Order Cabang <span id="badge-order" class="badge-count"></span></a>
            <a href="admin_req_dapur.html">Req Dapur <span id="badge-dapur" class="badge-count"></span></a>
            <a href="admin_req_trx.html">Req Transaksi <span id="badge-trx" class="badge-count"></span></a>
            <a href="admin_notif.html">Notifikasi <span id="badge-notif" class="badge-count"></span></a>
            <a href="admin_akun.html">Manajemen Akun</a>
            <a href="admin_setting.html">Pengaturan</a>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; color: #1a1a1a; margin-bottom: 20px; font-size:16px;">Daftar Permintaan Stok Etalase</h3>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Waktu Request</th><th>Cabang Peminta</th><th>Rincian Barang</th><th>Status Pengiriman</th><th>Aksi Eksekusi</th></tr></thead>
                    <tbody id="order-list"><tr><td colspan="5" style="text-align:center; color:#6e6e6e;">Memuat data...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://xlfbiavdodyxnmgnsvls.supabase.co', 'sb_publishable_wAvlgdaWcmevkDxOSTALwQ_wpUP5byQ');
        if (localStorage.getItem('userRole') !== 'admin_pusat' && localStorage.getItem('userRole') !== 'admin') window.location.href = 'login.html';
        document.getElementById('user-info').innerText = `Otoritas: Admin Pusat | Area: Arasa ${localStorage.getItem('userBranch') || 'Pusat'}`;

        async function loadOrders() {
            const { data } = await supabaseClient.from('order_cabang').select('*, order_cabang_detail(*)').order('created_at', { ascending: false });
            const tbody = document.getElementById('order-list'); tbody.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(order => {
                    let rincian = order.order_cabang_detail.map(d => `• ${d.item_name} <b style="color:#8b1a1a;">(${d.qty})</b>`).join('<br>');
                    let statusBadge = ''; let aksiBtn = '';
                    if (order.status === 'request') {
                        statusBadge = '<span class="badge-status bg-warning">Menunggu ACC</span>';
                        aksiBtn = `<button onclick="prosesKirim(${order.id})" class="btn btn-primary">ACC & Kirim Barang</button>`;
                    } else if (order.status === 'dikirim') {
                        statusBadge = '<span class="badge-status bg-info">Sedang Dikirim</span>';
                        aksiBtn = '<span style="color: #6e6e6e; font-size: 12px; font-weight:600;">Menunggu Diterima</span>';
                    } else if (order.status === 'konfirmasi') {
                        statusBadge = '<span class="badge-status bg-success">Tuntas</span>';
                        aksiBtn = '<span style="color: #2e7d32; font-size: 12px; font-weight: 700;">Pengiriman Selesai</span>';
                    }
                    tbody.innerHTML += `<tr><td style="color:#6e6e6e;">${new Date(order.created_at).toLocaleString('id-ID')}</td><td style="font-weight: 700; color: #1a1a1a;">Arasa ${order.branch_name}</td><td style="line-height:1.6;">${rincian}</td><td>${statusBadge}</td><td>${aksiBtn}</td></tr>`;
                });
            } else { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#6e6e6e;">Belum ada antrean order cabang.</td></tr>'; }
            updateBadges();
        }

        async function prosesKirim(orderId) {
            if (confirm("Kirim barang sekarang? Stok etalase Pusat akan otomatis dipotong sistem.")) {
                await supabaseClient.from('order_cabang').update({ status: 'dikirim' }).eq('id', orderId); loadOrders();
            }
        }

        async function updateBadges() {
            try {
                const { count: cNotif } = await supabaseClient.from('notifications').select('*', { count: 'exact', head: true }).eq('is_read', false);
                const { count: cOrder } = await supabaseClient.from('order_cabang').select('*', { count: 'exact', head: true }).eq('status', 'request');
                const { count: cDapur } = await supabaseClient.from('belanja_harian').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const { count: cTrx } = await supabaseClient.from('request_trx').select('*', { count: 'exact', head: true }).eq('status', 'pending');
                const setB = (id, v) => { const e = document.getElementById(id); if(e){ e.innerText = v > 99 ? '99+' : v; e.style.display = v > 0 ? 'inline-block' : 'none'; } };
                setB('badge-notif', cNotif); setB('badge-order', cOrder); setB('badge-dapur', cDapur); setB('badge-trx', cTrx);
            } catch(e) {}
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        loadOrders();
    </script>
</body>
</html>
